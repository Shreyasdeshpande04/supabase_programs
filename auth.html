<!DOCTYPE html>
<html>
<head>
  <title>Supabase Auth Working</title>
</head>
<body>

<h2>Supabase Signup</h2>

<input id="email" type="email" placeholder="Enter Email">
<br><br>

<input id="password" type="password" placeholder="Enter Password">
<br><br>

<button onclick="signup()">Signup</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'YOUR_SUPABASE_URL'
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'

// create ONE client only
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

// GLOBAL FUNCTION (important for onclick)
window.signup = async function () {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("EMAIL:", email);
  console.log("PASSWORD:", password);

  // basic validation
  if (!email || !password) {
    document.getElementById("msg").innerText = "Email and Password required";
    return;
  }

  if (password.length < 6) {
    document.getElementById("msg").innerText = "Password must be at least 6 characters";
    return;
  }

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if (error) {
    console.log("ERROR:", error.message);
    document.getElementById("msg").innerText = error.message;
  } else {
    console.log("SUCCESS:", data);
    document.getElementById("msg").innerText =
      "Signup successful! Check Supabase Authentication → Users";
  }
}
</script>

</body>
</html>
