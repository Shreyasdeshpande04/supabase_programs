<!DOCTYPE html>
<html>
<head>
  <title>Supabase Products Demo</title>
</head>
<body>

<h2>Products List (Filter + Sorting)</h2>

<button onclick="loadAll()">Load All Products</button>
<button onclick="loadFiltered()">Price > 15000</button>

<h3>Output</h3>
<ul id="output"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'YOUR_SUPABASE_URL'
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'

const client = window.supabase.createClient(supabaseUrl, supabaseKey);


window.loadAll = async function () {

  const { data, error } = await client
    .from('products')
    .select('*')
    .order('price', { ascending: false });

  showData(data, error);
}



window.loadFiltered = async function () {

  const { data, error } = await client
    .from('products')
    .select('*')
    .gt('price', 15000)
    .order('price', { ascending: false });

  showData(data, error);
}



function showData(data, error) {

  const output = document.getElementById("output");
  output.innerHTML = "";

  if (error) {
    output.innerHTML = "<li>Error loading data</li>";
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    output.innerHTML = "<li>No products found</li>";
    return;
  }

  data.forEach(p => {
    const li = document.createElement("li");
    li.innerText =
      p.name + " - ₹" + p.price;

    output.appendChild(li);
  });
}
</script>

</body>
</html>
