<!DOCTYPE html>
<html>
<head>
  <title>Supabase Storage Upload</title>
</head>
<body>

<h2>Upload File</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'YOUR_SUPABASE_URL'
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'

// IMPORTANT: use different variable name
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

// GLOBAL function (fix onclick error)
window.uploadFile = async function () {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    document.getElementById("msg").innerText = "Please select a file";
    return;
  }

  const fileName = "uploads/" + Date.now() + "_" + file.name;

  const { data, error } = await client
    .storage
    .from("image")
    .upload(fileName, file);

  if (error) {
    console.log(error);
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("msg").innerText = "File Uploaded Successfully!";
    console.log(data);
  }
}
</script>

</body>
</html>
